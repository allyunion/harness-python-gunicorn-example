apiVersion: apps/v1
kind: Deployment
metadata:
  name: gunicorn-hello
  labels:
    app: gunicorn-hello
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gunicorn-hello
  template:
    metadata:
      labels:
        app: gunicorn-hello
    spec:
      containers:
        - name: gunicorn-hello
          image: <+artifacts.primary.image>
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: gunicorn-hello
  labels:
    app: gunicorn-hello
spec:
  type: ClusterIP
  selector:
    app: gunicorn-hello
  ports:
    - name: http
      port: 8000
      targetPort: http
      protocol: TCP
