pipeline:
  name: gunicorn_app
  identifier: gunicorn_app
  projectIdentifier: gunicorn_ci
  orgIdentifier: default
  tags: {}
  properties:
    ci:
      codebase:
        connectorRef: github_gunicorn_repo_connector
        build: <+input>
  stages:
    - stage:
        name: build_gunicorn
        identifier: build_gunicorn
        description: ""
        type: CI
        spec:
          cloneCodebase: true
          caching:
            enabled: false
            override: true
            paths: []
          buildIntelligence:
            enabled: false
          infrastructure:
            type: KubernetesDirect
            spec:
              connectorRef: k8s_docker_desktop_connector
              namespace: gunicorn-harness
              automountServiceAccountToken: true
              nodeSelector: {}
              os: Linux
          execution:
            steps:
              - step:
                  type: Run
                  name: Install Test Dependencies
                  identifier: Install_Test_Dependencies
                  spec:
                    connectorRef: dockerhub_anonymous_connector
                    image: python:3.13
                    shell: Bash
                    command: |-
                      python -m venv /harness/venv
                      /harness/venv/bin/pip install -e .
                      /harness/venv/bin/pip install -r requirements_test.txt
              - step:
                  type: Run
                  name: Run Gunicorn Test Suite
                  identifier: Run_Gunicorn_Test_Suite
                  spec:
                    connectorRef: dockerhub_anonymous_connector
                    image: python:3.13
                    shell: Bash
                    command: /harness/venv/bin/pytest --cov=gunicorn
                  when:
                    stageStatus: Success
                    condition: <+pipeline.variables.skip_gunicorn_tests> == "false"
              - step:
                  type: Run
                  name: Build Package
                  identifier: Build_Wheel
                  spec:
                    connectorRef: dockerhub_anonymous_connector
                    image: python:3.13
                    shell: Bash
                    command: |-
                      /harness/venv/bin/pip install build
                      /harness/venv/bin/python -m build
              - step:
                  type: Run
                  name: Publish Package to Local PyPi on Artifact Keeper
                  identifier: Publish_Package_to_Local_PyPi_on_Artifact_Keeper
                  spec:
                    connectorRef: dockerhub_anonymous_connector
                    image: python:3.13
                    shell: Bash
                    command: |-
                      pip install twine
                      twine upload --repository-url http://ak-artifact-keeper-backend.artifact-keeper.svc.cluster.local:8080/pypi/pypi/ \
                        -u admin -p <+secrets.getValue("artifact_keeper_pypi_token")> \
                        /harness/dist/*
        variables:
          - name: skip_gunicorn_tests
            type: String
            description: ""
            required: true
            value: <+input>.default(false).selectOneFrom(false,true)
        when:
          pipelineStatus: Success
          condition: <+pipeline.variables.skip_build_gunicorn> == "false"
    - stage:
        name: build_app
        identifier: build_app
        description: ""
        type: CI
        spec:
          cloneCodebase: false
          caching:
            enabled: false
            override: true
            paths: []
          buildIntelligence:
            enabled: false
          infrastructure:
            type: KubernetesDirect
            spec:
              connectorRef: k8s_docker_desktop_connector
              namespace: gunicorn-harness
              automountServiceAccountToken: true
              nodeSelector: {}
              os: Linux
          execution:
            steps:
              - step:
                  type: Run
                  name: Download build_gunicorn artifacts
                  identifier: Download_build_gunicorn_artifacts
                  spec:
                    connectorRef: dockerhub_anonymous_connector
                    image: python:3.13-slim
                    shell: Bash
                    command: |-
                      python -m venv /harness/pylibrary
                      /harness/pylibrary/bin/pip install --no-cache-dir \
                        --index-url http://admin:<+secrets.getValue("artifact_keeper_pypi_token")>@ak-artifact-keeper-backend.artifact-keeper.svc.cluster.local:8080/pypi/pypi/simple \
                        --extra-index-url https://pypi.org/simple \
                        gunicorn
              - step:
                  type: GitClone
                  name: Clone harness-python-gunicorn-app
                  identifier: Clone_harnesspythongunicornapp
                  spec:
                    connectorRef: github_primary_repo_connector
                    build:
                      type: branch
                      spec:
                        branch: main
              - step:
                  type: Run
                  name: Install Dependencies
                  identifier: Install_Dependencies
                  spec:
                    connectorRef: dockerhub_anonymous_connector
                    image: python:3.13-slim
                    shell: Bash
                    command: /harness/pylibrary/bin/pip install --no-cache-dir -r harness-python-gunicorn-app/requirements.txt
              - step:
                  type: Run
                  name: Run Tests
                  identifier: Run_Tests
                  spec:
                    connectorRef: dockerhub_anonymous_connector
                    image: python:3.13
                    shell: Bash
                    command: |-
                      python -m venv /harness/test-venv
                      /harness/test-venv/bin/pip install --no-cache-dir \
                        --index-url http://admin:<+secrets.getValue("artifact_keeper_pypi_token")>@ak-artifact-keeper-backend.artifact-keeper.svc.cluster.local:8080/pypi/pypi/simple \
                        --extra-index-url https://pypi.org/simple \
                        gunicorn
                      /harness/test-venv/bin/pip install --no-cache-dir -r harness-python-gunicorn-app/requirements.txt  
                      /harness/test-venv/bin/pip install --no-cache-dir -r harness-python-gunicorn-app/requirements-test.txt
                      cd harness-python-gunicorn-app && /harness/test-venv/bin/python -m pytest
              - step:
                  type: BuildAndPushDockerRegistry
                  name: Push to Docker Artifact Keeper
                  identifier: Push_to_Docker_Artifact_Keeper
                  spec:
                    connectorRef: docker_images
                    repo: http://ak-artifact-keeper-backend.artifact-keeper.svc.cluster.local:8080/docker/gunicorn-hello
                    tags:
                      - <+pipeline.sequenceId>
                    caching: true
                    dockerfile: harness-python-gunicorn-app/Dockerfile
                    context: harness-python-gunicorn-app
                    remoteCacheRepo: http://ak-artifact-keeper-backend.artifact-keeper.svc.cluster.local:8080/docker
                    runAsUser: "0"
                    envVariables:
                      PLUGIN_INSECURE: "true"
  variables:
    - name: skip_build_gunicorn
      type: String
      description: skip_build_gunicorn
      required: true
      value: <+input>.default(false).selectOneFrom(false,true)
