pipeline:
  name: gunicorn_app
  identifier: gunicorn_app
  projectIdentifier: gunicorn_ci
  orgIdentifier: default
  tags: {}
  properties:
    ci:
      codebase:
        connectorRef: github_gunicorn_repo_connector
        build: <+input>
  stages:
    - stage:
        name: build_gunicorn
        identifier: build_gunicorn
        description: ""
        type: CI
        spec:
          cloneCodebase: true
          caching:
            enabled: false
            override: true
            paths: []
          buildIntelligence:
            enabled: false
          infrastructure:
            type: KubernetesDirect
            spec:
              connectorRef: k8s_docker_desktop_connector
              namespace: gunicorn-harness
              automountServiceAccountToken: true
              nodeSelector: {}
              os: Linux
          execution:
            steps:
              - step:
                  type: Run
                  name: Install Test Dependencies
                  identifier: Install_Test_Dependencies
                  spec:
                    connectorRef: dockerhub_anonymous_connector
                    image: python:3.13
                    shell: Bash
                    command: |-
                      python -m venv /harness/venv
                      /harness/venv/bin/pip install -e .
                      /harness/venv/bin/pip install -r requirements_test.txt
              - step:
                  type: Run
                  name: Run Gunicorn Test Suite
                  identifier: Run_Gunicorn_Test_Suite
                  spec:
                    connectorRef: dockerhub_anonymous_connector
                    image: python:3.13
                    shell: Bash
                    command: /harness/venv/bin/pytest --cov=gunicorn
                  when:
                    stageStatus: Success
                    condition: <+pipeline.variables.skip_gunicorn_tests> == "false"
              - step:
                  type: Run
                  name: Build Package
                  identifier: Build_Wheel
                  spec:
                    connectorRef: dockerhub_anonymous_connector
                    image: python:3.13
                    shell: Bash
                    command: |-
                      /harness/venv/bin/pip install build
                      /harness/venv/bin/python -m build
              - step:
                  type: Run
                  name: Publish Package to Local PyPi on Artifact Keeper
                  identifier: Publish_Package_to_Local_PyPi_on_Artifact_Keeper
                  spec:
                    connectorRef: dockerhub_anonymous_connector
                    image: python:3.13
                    shell: Bash
                    command: |-
                      pip install twine
                      twine upload --repository-url http://ak-artifact-keeper-backend.artifact-keeper.svc.cluster.local:8080/pypi/pypi/ \
                        -u admin -p <+secrets.getValue("artifact_keeper_pypi_token")> --verbose \
                        /harness/dist/*
        variables:
          - name: skip_gunicorn_tests
            type: String
            description: ""
            required: true
            value: <+input>.default(false).selectOneFrom(false,true)
